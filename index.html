<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--tp:#A89880;--tpl:#C4B5A2;--cr:#F5F0EA;--dk:#2C2520;--red:#C0392B;--grn:#4A7A45;--blue:#1a73e8}
html,body{height:100%;background:var(--tp)}
#root{font-family:'Noto Sans SC',sans-serif;max-width:100%;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--tp)}
#hdr{padding:.8rem 1.2rem .5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lm{width:32px;height:32px;border:1px solid rgba(255,255,255,.4);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;flex-shrink:0}
.l1{font-size:7px;letter-spacing:.1em;opacity:.7;font-family:'Playfair Display',serif;color:#fff;display:block}
.l2{font-size:12px;font-family:'Playfair Display',serif;font-weight:500;color:#fff;display:block}
.brand{font-family:'Playfair Display',serif;font-size:14px;color:#fff;margin-left:8px}
.brand small{display:block;font-size:9px;letter-spacing:.12em;opacity:.6;text-transform:uppercase;font-family:'Noto Sans SC',sans-serif;margin-top:1px}
.gear{background:none;border:1px solid rgba(255,255,255,.3);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px}
.pg{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pg.gone{display:none!important}
/* Home */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:.1rem 1.2rem .6rem;color:#fff;flex-shrink:0}
.date-nav button{background:none;border:none;color:rgba(255,255,255,.55);font-size:22px;cursor:pointer;padding:2px 10px;line-height:1}
.dcenter .d{font-family:'Playfair Display',serif;font-size:16px;color:#fff;text-align:center}
.dcenter .ds{font-size:9px;letter-spacing:.1em;opacity:.6;text-transform:uppercase;margin-top:2px;text-align:center}
.sumbar{display:flex;gap:6px;padding:0 1.2rem 1rem;flex-shrink:0}
.smc{flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:.45rem .3rem;text-align:center}
.sml{font-size:8px;letter-spacing:.06em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:2px}
.smv{font-size:13px;font-weight:500;color:#fff;font-family:'Playfair Display',serif}
.smv.neg{color:#ffb3b3}
.rec-area{background:#fff;border-radius:22px 22px 0 0;flex:1;overflow-y:auto;padding:1.1rem 1.1rem 5rem}
.empty{text-align:center;padding:2.5rem 0;color:#ccc}
.empty p{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;margin-bottom:4px}
.empty small{font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.rec{display:flex;align-items:center;padding:10px 0;border-bottom:.5px solid #F0EBE4;gap:8px}
.rec:last-child{border:none}
.rec-bar{width:3px;border-radius:2px;height:36px;flex-shrink:0}
.rec-bar.inc{background:var(--grn)}.rec-bar.exp{background:var(--red)}
.rec-main{flex:1;min-width:0}
.rtitle{font-size:13px;font-weight:500;color:var(--dk)}
.rsub{font-size:10px;color:#bbb;margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 6px;border-radius:20px;font-size:8px;letter-spacing:.05em;text-transform:uppercase}
.tc{background:#EAF0E4;color:#5A7A45}.te{background:#E4EAF0;color:#45607A}.tr{background:#F0EAE4;color:#7A6045}.tn{background:#F0E4F0;color:#7A457A}.tx{background:#F0F0F0;color:#888}
.ramt{font-size:15px;font-family:'Playfair Display',serif;text-align:right;white-space:nowrap}
.ramt.inc{color:var(--dk)}.ramt.exp{color:var(--red)}
.rec-actions{display:flex;gap:3px;flex-shrink:0}
.ract{width:26px;height:26px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}
.ract-e{background:#F5F0EA;color:var(--tp)}.ract-d{background:#FFF0F0;color:var(--red)}
#fab{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;border:none;border-radius:50px;padding:11px 24px;font-size:13px;font-weight:500;font-family:'Noto Sans SC',sans-serif;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 18px rgba(0,0,0,.25);z-index:5;white-space:nowrap}
#nav{display:flex;background:#fff;border-top:.5px solid #EEE;flex-shrink:0;z-index:4;max-width:100%}
.ntab{flex:1;padding:.6rem;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;font-family:'Noto Sans SC',sans-serif}
.ntab-i{font-size:15px;line-height:1}
.ntab-l{font-size:9px;letter-spacing:.05em;color:#bbb}
.ntab.on .ntab-l{color:var(--tp)}
/* Form */
#formPg{background:#fff;overflow-y:auto}
.fi{padding:1.25rem 1.4rem 3rem;max-width:440px;margin:0 auto}
.form-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.bk{background:none;border:none;color:#bbb;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;gap:3px;font-family:'Noto Sans SC',sans-serif}
.cx{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0;line-height:1}
.prog{display:flex;gap:5px;justify-content:center;margin-bottom:1.2rem}
.dot{width:5px;height:5px;border-radius:50%;background:#D5C9BE;transition:all .3s}
.dot.on{background:var(--tp);width:14px;border-radius:3px}
.slbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);text-align:center;margin-bottom:.3rem}
h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--dk);text-align:center;margin-bottom:1.1rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.pill{padding:14px;border-radius:50px;border:1px solid #E0D8D0;background:#fff;text-align:center;font-size:14px;color:var(--dk);cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;user-select:none;transition:all .12s;width:100%}
.pill:active,.pill.sel{background:var(--tp);color:#fff;border-color:var(--tp)}
.en{font-size:10px;opacity:.45;font-family:'Playfair Display',serif;font-style:italic}
.g2 .pill{margin-bottom:0}
.agt{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.ap{padding:13px 4px;border-radius:40px;border:1px solid #E0D8D0;background:#fff;text-align:center;font-size:14px;font-weight:500;color:var(--dk);cursor:pointer;user-select:none;transition:all .12s}
.ap:active,.ap.sel{background:var(--tp);color:#fff;border-color:var(--tp)}
.cta{width:100%;padding:14px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans SC',sans-serif;letter-spacing:.04em;display:block;margin-top:4px}
.cta-p{background:var(--dk);color:#fff}.cta-p:disabled{opacity:.35}
.cta-g{background:transparent;color:#bbb;border:1px solid #E0D8D0;margin-top:8px}
input[type=text],input[type=number],input[type=date],textarea{width:100%;padding:12px 16px;border-radius:50px;border:1px solid #E0D8D0;font-size:14px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;margin-bottom:10px;-webkit-appearance:none;appearance:none}
textarea{border-radius:16px;resize:none;height:68px}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,textarea:focus{border-color:var(--tp)}
.ok-ring{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--tp);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;color:var(--tp);font-size:20px}
.err{color:var(--red);font-size:11px;text-align:center;margin-top:6px}
.type-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.type-btn{padding:22px 8px;border-radius:16px;border:1.5px solid #E0D8D0;background:#fff;text-align:center;cursor:pointer;transition:all .15s;font-family:'Noto Sans SC',sans-serif}
.type-btn .ti{font-size:26px;margin-bottom:8px}
.type-btn .tl{font-size:15px;font-weight:500;color:var(--dk)}
.type-btn .ts{font-size:10px;color:#bbb;margin-top:3px}
.type-btn.inc-sel{background:#EAF2EA;border-color:var(--grn)}
.type-btn.exp-sel{background:#FAEAEA;border-color:var(--red)}
/* Stats */
#statsPg{background:var(--cr);overflow-y:auto;padding:1rem 1.1rem 5rem;flex:1}
.ptabs{display:flex;background:#fff;border-radius:50px;padding:3px;margin-bottom:.9rem;gap:3px}
.ptab{flex:1;padding:8px 4px;border-radius:50px;border:none;background:transparent;font-size:11px;font-family:'Noto Sans SC',sans-serif;color:#bbb;cursor:pointer;letter-spacing:.03em;transition:all .2s}
.ptab.on{background:var(--dk);color:#fff}
.crange{display:flex;gap:6px;align-items:center;margin-bottom:.9rem;flex-wrap:wrap}
.crange input{flex:1;min-width:0;padding:8px 12px;border-radius:50px;border:1px solid #E0D8D0;font-size:11px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;-webkit-appearance:none;margin-bottom:0}
.crange button{padding:8px 12px;border-radius:50px;background:var(--dk);color:#fff;border:none;font-size:11px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap}
.scard{background:#fff;border-radius:14px;padding:1rem;margin-bottom:.8rem}
.stitle{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);margin-bottom:.8rem}
.krow{display:flex;gap:7px;margin-bottom:.7rem}
.kpi{flex:1;background:#fff;border-radius:12px;padding:.8rem .5rem;text-align:center}
.kpi-v{font-family:'Playfair Display',serif;font-size:20px;color:var(--dk);line-height:1}
.kpi-l{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin-top:3px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}.brow:last-child{margin-bottom:0}
.blbl{font-size:11px;color:var(--dk);width:58px;flex-shrink:0}
.btrack{flex:1;background:#F0EBE4;border-radius:4px;height:6px;overflow:hidden}
.bfill{height:100%;border-radius:4px;transition:width .6s ease}
.bnum{font-size:11px;color:#bbb;width:24px;text-align:right;flex-shrink:0}

/* ===== SPREADSHEET ===== */
#ledgerPg{display:flex;flex-direction:column;flex:1;min-height:0;background:#f8f9fa;overflow:hidden}
.ss-topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.ss-mth-nav{display:flex;align-items:center;gap:4px}
.ss-mth-nav button{background:none;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px;color:#5f6368;display:flex;align-items:center;justify-content:center}
.ss-mth-nav button:hover{background:#f1f3f4}
.ss-mth{font-size:14px;font-weight:500;color:#202124;min-width:100px;text-align:center;font-family:'Noto Sans SC',sans-serif}
.ss-divider{width:1px;height:20px;background:#e0e0e0;margin:0 2px}
.ss-btn{padding:5px 12px;border-radius:4px;border:1px solid #dadce0;background:#fff;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:#202124;display:flex;align-items:center;gap:4px;white-space:nowrap}
.ss-btn:hover{background:#f1f3f4}
.ss-btn.primary{background:var(--dk);color:#fff;border-color:var(--dk)}
.ss-btn.primary:hover{background:#3d3330}
.ss-formulabar{background:#fff;border-bottom:1px solid #e0e0e0;padding:4px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;font-family:Arial,sans-serif}
.ss-cellref{width:52px;border:1px solid #dadce0;border-radius:3px;padding:3px 6px;font-size:12px;color:#5f6368;text-align:center;flex-shrink:0}
.ss-fbdivider{width:1px;height:18px;background:#e0e0e0}
.ss-fval{flex:1;font-size:13px;color:#202124;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:22px}
.ss-grid-wrap{flex:1;overflow:auto;min-height:0;position:relative}
.ss-table{border-collapse:collapse;min-width:100%;font-size:13px;font-family:Arial,'Noto Sans SC',sans-serif}
.ss-corner{background:#f8f9fa;border:1px solid #e2e3e4;width:40px;min-width:40px;position:sticky;top:0;left:0;z-index:4}
.ss-ch{background:#f8f9fa;border:1px solid #e2e3e4;padding:4px 6px;text-align:center;font-size:11px;font-weight:500;color:#5f6368;position:sticky;top:0;z-index:3;white-space:nowrap;user-select:none}
.ss-rn{background:#f8f9fa;border:1px solid #e2e3e4;text-align:center;font-size:11px;color:#5f6368;width:40px;min-width:40px;position:sticky;left:0;z-index:2;user-select:none}
.ss-cell{border:1px solid #e2e3e4;padding:0;height:28px;position:relative;background:#fff}
.ss-cell.sel{box-shadow:inset 0 0 0 2px var(--blue);z-index:1}
.ss-cell.inc-bg{background:#f6fff6}
.ss-cell.exp-bg{background:#fff6f6}
.ss-inp{width:100%;height:100%;border:none;outline:none;background:transparent;padding:3px 6px;font-size:13px;font-family:Arial,'Noto Sans SC',sans-serif;color:#202124;cursor:default}
.ss-inp:focus{cursor:text}
.ss-sel{width:100%;height:100%;border:none;outline:none;background:transparent;padding:2px 4px;font-size:12px;font-family:Arial,'Noto Sans SC',sans-serif;color:#202124;cursor:pointer;-webkit-appearance:none;appearance:none}
.ss-cell-del{display:none;position:absolute;right:2px;top:50%;transform:translateY(-50%);background:#ffebee;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;color:var(--red);align-items:center;justify-content:center;z-index:3;padding:0}
tr:hover .ss-cell-del{display:flex}
.ss-amt-inc{color:var(--grn);font-weight:500}
.ss-amt-exp{color:var(--red);font-weight:500}
.ss-tot-row td{background:#f0f4f8;font-weight:600;font-size:12px;color:#202124;border:1px solid #c8d0d8}
.ss-tot-row .ss-rn{background:#e8ecf0}
.ss-newr-row td{background:#fafafa;border:1px solid #e8e8e8}
.ss-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:11px;font-weight:500}
.ss-badge.inc{background:#e8f5e9;color:var(--grn)}
.ss-badge.exp{background:#ffebee;color:var(--red)}
.ss-sheet-tabs{background:#fff;border-top:1px solid #e0e0e0;padding:0 8px;display:flex;align-items:center;gap:4px;flex-shrink:0;height:34px}
.ss-tab{padding:6px 16px;border-radius:4px 4px 0 0;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:#5f6368;cursor:pointer;border:1px solid transparent;border-bottom:none;background:transparent}
.ss-tab.on{background:#fff;border-color:#e0e0e0;color:var(--dk);font-weight:500;border-bottom:2px solid var(--tp)}
/* Confirm dialog */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.dlg{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:1.4rem 1.4rem 2rem}
.dlg h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--dk);margin-bottom:.4rem}
.dlg p{font-size:12px;color:#aaa;margin-bottom:1.1rem}
.dlg-btns{display:flex;gap:10px}
.dlg-btns button{flex:1;padding:12px;border-radius:50px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;border:none}
.dlg-cancel{background:#F5F0EA;color:var(--dk)}.dlg-confirm{background:var(--red);color:#fff}
</style>

<div id="root">

<script>
const AMTS_INC=[20,40,45,50,60],AMTS_EXP=[10,20,30,50,100];
const CATS=['睫毛材料','工具设备','房租场地','广告推广','交通','其他'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['日','一','二','三','四','五','六'];
const TMAP={Cash:'tc',EMT:'te',RMB:'tr'};
const COL_LETTERS=['A','B','C','D','E','F'];
const COLS=[
  {k:'date',   h:'日期',     w:92,  t:'date'},
  {k:'type',   h:'类型',     w:68,  t:'sel', o:['收入','支出']},
  {k:'proj',   h:'项目',     w:100, t:'txt'},
  {k:'sub',    h:'客人/备注', w:100, t:'txt'},
  {k:'amount', h:'金额',     w:78,  t:'num'},
  {k:'pay',    h:'付款方式',  w:80,  t:'sel', o:['Cash','EMT','RMB']},
];

let gsUrl='',fstep=0,editMode=false,editId=null,editDate=null,statPer='week';
let viewDate=new Date(),ledDate=new Date(),cStart=null,cEnd=null,delCb=null;
let form={type:'',date:'',service:'',customer:'',category:'',note:'',amount:'',payment:''};
let ssRecs=[],selCell=null; // {ri,ci}

const q=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,'0');}
function td(d=new Date()){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtD(d){return d.getDate()+' '+MS[d.getMonth()]+' '+d.getFullYear();}
function mthLabel(d){return MS[d.getMonth()]+' '+d.getFullYear();}
function isToday(d){return td(d)===td();}
function dKey(d){return 'bb:r:'+td(d);}
function nowT(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes());}
function amtN(s){return parseFloat((s||'').replace(/[$¥+-]/g,''))||0;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function daysInMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}

async function loadRecs(d){try{const r=await window.storage.get(dKey(d));return r&&r.value?JSON.parse(r.value):[];}catch{return[];}}
async function saveRecs(d,recs){try{await window.storage.set(dKey(d),JSON.stringify(recs));}catch{}}
async function addRec(d,rec){const recs=await loadRecs(d);recs.push({...rec,_id:uid()});await saveRecs(d,recs);}
async function updRec(d,id,rec){await saveRecs(d,(await loadRecs(d)).map(r=>r._id===id?{...rec,_id:id}:r));}
async function delRec(d,id){await saveRecs(d,(await loadRecs(d)).filter(r=>r._id!==id));}

async function monthRecs(d){
  const all=[],n=daysInMonth(d);
  for(let i=1;i<=n;i++){const dd=new Date(d.getFullYear(),d.getMonth(),i);(await loadRecs(dd)).forEach(r=>all.push({...r,_d:td(dd)}));}
  return all;
}
async function rangeRecs(s,e){
  const all=[],d=new Date(s),end=new Date(e);
  while(d<=end){(await loadRecs(new Date(d))).forEach(r=>all.push({...r,_d:td(new Date(d))}));d.setDate(d.getDate()+1);}
  return all;
}
function weekRange(d=new Date()){const dy=d.getDay(),df=dy===0?-6:1-dy,m=new Date(d.getFullYear(),d.getMonth(),d.getDate()+df);return[m,new Date(m.getFullYear(),m.getMonth(),m.getDate()+6)];}
function monthRange(d=new Date()){return[new Date(d.getFullYear(),d.getMonth(),1),new Date(d.getFullYear(),d.getMonth()+1,0)];}
function calcTotals(recs){
  let inc=0,exp=0,cash=0,emt=0,rmb=0;
  recs.forEach(r=>{if(r.type==='expense'){exp+=amtN(r.amount);}else{const a=amtN(r.amount);inc+=a;if(r.payment==='Cash')cash+=a;else if(r.payment==='EMT')emt+=a;else if(r.payment==='RMB')rmb+=a;}});
  return{inc,exp,cash,emt,rmb,bal:inc-exp};
}

// ---- NAV ----
function nav(pg){
  document.querySelectorAll('.pg').forEach(p=>p.classList.toggle('gone',p.id!==pg));
  q('nav').style.display=pg==='formPg'?'none':'flex';
  q('fab').style.display=pg==='homePg'?'block':'none';
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('on',t.dataset.pg===pg));
  if(pg==='homePg')renderHome();
  if(pg==='statsPg')renderStats();
  if(pg==='ledgerPg')renderLedger();
}

// ---- HOME ----
async function renderHome(){
  const recs=await loadRecs(viewDate);
  q('dDisp').textContent=fmtD(viewDate);q('dSub').textContent=isToday(viewDate)?'今天':'历史';
  const{inc,exp,cash,emt}=calcTotals(recs);
  q('sumbar').innerHTML=`<div class="smc"><div class="sml">收入</div><div class="smv">$${inc.toFixed(0)}</div></div><div class="smc"><div class="sml">支出</div><div class="smv ${exp>0?'neg':''}">-$${exp.toFixed(0)}</div></div><div class="smc"><div class="sml">Cash</div><div class="smv">$${cash.toFixed(0)}</div></div><div class="smc"><div class="sml">EMT</div><div class="smv">$${emt.toFixed(0)}</div></div>`;
  if(!recs.length){q('recList').innerHTML='<div class="empty"><p>暂无记录</p><small>点击下方 ＋ 新增</small></div>';return;}
  q('recList').innerHTML=[...recs].reverse().map(r=>{
    const isExp=r.type==='expense';
    const title=isExp?(r.category||'支出'):`${r.service}·${r.customer}`;
    const sub=isExp?`${r.time||''} <span class="tag tx">${r.payment}</span>${r.note?' · '+r.note:''}`:
      `${r.time||''} <span class="tag ${TMAP[r.payment]||''}">${r.payment}</span>${r.customer==='New'?'<span class="tag tn">新客</span>':''}`;
    return`<div class="rec"><div class="rec-bar ${isExp?'exp':'inc'}"></div><div class="rec-main"><div class="rtitle">${title}</div><div class="rsub">${sub}</div></div><div class="ramt ${isExp?'exp':'inc'}">${isExp?'-':''}${r.amount}</div><div class="rec-actions"><button class="ract ract-e" data-id="${r._id}" data-act="edit">✏️</button><button class="ract ract-d" data-id="${r._id}" data-act="del">×</button></div></div>`;
  }).join('');
  q('recList').querySelectorAll('.ract').forEach(btn=>btn.addEventListener('click',async function(){
    const id=this.dataset.id,act=this.dataset.act,rec=(await loadRecs(viewDate)).find(r=>r._id===id);
    if(!rec)return;
    if(act==='del')confirm(`删除 ${rec.type==='expense'?rec.category:rec.service} ${rec.amount}？`,async()=>{await delRec(viewDate,id);renderHome();});
    else openEdit(rec);
  }));
}

// ---- FORM ----
function openForm(){editMode=false;editId=null;editDate=null;form={type:'',date:td(viewDate),service:'',customer:'',category:'',note:'',amount:'',payment:''};fstep=0;nav('formPg');renderForm();}
function openEdit(rec){editMode=true;editId=rec._id;editDate=new Date(viewDate);form={...rec};fstep=1;nav('formPg');renderForm();}
function mkProg(cur,tot){return '<div class="prog">'+Array.from({length:tot},(_,i)=>`<div class="dot${i<cur?' on':''}"></div>`).join('')+'</div>';}
const isInc=()=>form.type==='income';
function confirmCard(){
  const rows=isInc()?[['SERVICE',form.service],['CLIENT',form.customer],['AMOUNT',form.amount],['PAYMENT',form.payment]]:[['CATEGORY',form.category],['AMOUNT',form.amount],['PAYMENT',form.payment]];
  return`<div style="background:var(--cr);border-radius:14px;padding:.9rem 1.1rem;margin-bottom:1rem">${rows.map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid #EAE4DC;font-size:12px"><span style="color:#bbb;font-size:10px;letter-spacing:.06em">${l}</span><span style="font-weight:500;color:var(--dk)">${v}</span></div>`).join('')}</div>`;
}

    else if(fstep===3){const sc=form.amount&&!AMTS_INC.map(a=>'$'+a).includes(form.amount);body=`${mkProg(3,5)}<div class="slbl">Step 3/5 · 金额</div><h2>服务金额</h2><div class="agt">${AMTS_INC.map(a=>`<div class="ap amb${form.amount==='$'+a?' sel':''}" data-v="$${a}">$${a}</div>`).join('')}<div class="ap${sc?' sel':''}" id="ctog">自定义</div></div><div id="cbox" style="display:${sc?'block':'none'}"><input type="number" id="camt" placeholder="输入金额" value="${sc?amtN(form.amount):''}"/><button class="cta cta-p" id="cconf">确认</button></div>`;}

  }else{
    if(fstep===1)body=`${mkProg(1,4)}<div class="slbl">Step 1/4 · 支出类别</div><h2>支出类别</h2>${CATS.map(c=>`<div class="pill catb${form.category===c?' sel':''}" data-v="${c}">${c}</div>`).join('')}`;
    else if(fstep===2){const sc=form.amount&&!AMTS_EXP.map(a=>'$'+a).includes(form.amount);body=`${mkProg(2,4)}<div class="slbl">Step 2/4 · 金额</div><h2>支出金额</h2><div class="agt">${AMTS_EXP.map(a=>`<div class="ap amb${form.amount==='$'+a?' sel':''}" data-v="$${a}">$${a}</div>`).join('')}<div class="ap${sc?' sel':''}" id="ctog">自定义</div></div><div id="cbox" style="display:${sc?'block':'none'}"><input type="number" id="camt" placeholder="输入金额" value="${sc?amtN(form.amount):''}"/><button class="cta cta-p" id="cconf">确认</button></div>`;}

  q('fi').innerHTML=hdr+body;

  document.querySelectorAll('.cub').forEach(el=>el.addEventListener('click',function(){form.customer=this.dataset.v;fstep=3;renderForm();}));

  if(q('doneBtn'))q('doneBtn').onclick=()=>nav('homePg');
}

// ---- STATS ----
function barRows(items){const mx=Math.max(...items.map(i=>i.v),1);return items.map(i=>`<div class="brow"><div class="blbl">${i.l}</div><div class="btrack"><div class="bfill" style="width:${(i.v/mx*100).toFixed(1)}%;background:${i.c}"></div></div><div class="bnum">${i.v}</div></div>`).join('');}
function svgBar(data){if(!data.length)return'<p style="color:#ccc;text-align:center;font-size:11px;padding:.8rem 0">暂无数据</p>';const mx=Math.max(...data.map(d=>d.v),1),W=300,H=90,p=10,bw=Math.min(28,(W-p*2)/data.length-4),gap=(W-p*2)/data.length;let r='',t='',l='';data.forEach((d,i)=>{const bh=Math.max((d.v/mx)*(H-26),d.v?2:0),x=p+i*gap+gap/2-bw/2,y=H-16-bh;r+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="#A89880"/>`;if(d.v)t+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="#A89880">${d.v}</text>`;l+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-1}" text-anchor="middle" font-size="8" fill="#bbb">${d.l}</text>`;});return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">${r}${t}${l}</svg>`;}
async function renderStats(){
  let s,e;if(statPer==='week')[s,e]=weekRange();else if(statPer==='month')[s,e]=monthRange();else if(cStart&&cEnd){s=cStart;e=cEnd;}else[s,e]=weekRange();
  const recs=await rangeRecs(s,e),incR=recs.filter(r=>r.type!=='expense');
  const{inc:ti,exp:te,cash,emt,rmb}=calcTotals(recs);
  let fs=0,rf=0,nw=0,rt=0;incR.forEach(r=>{if(r.service==='Full Set')fs++;else rf++;if(r.customer==='New')nw++;else rt++;});
  const expByCat={};CATS.forEach(c=>expByCat[c]=0);recs.filter(r=>r.type==='expense').forEach(r=>{expByCat[r.category||'其他']=(expByCat[r.category||'其他']||0)+amtN(r.amount);});
  let cd=[];
  if(statPer==='week'){const d=new Date(s);while(d<=e){const k=td(new Date(d));cd.push({l:DAYS[d.getDay()],v:recs.filter(r=>r._d===k).length});d.setDate(d.getDate()+1);}
  }else{const wm={};recs.forEach(r=>{const pd=parseD(r._d),dy=pd.getDay(),df=dy===0?-6:1-dy,mon=new Date(pd.getFullYear(),pd.getMonth(),pd.getDate()+df),k=td(mon);wm[k]=(wm[k]||0)+1;});const d=new Date(s),dy=d.getDay(),df=dy===0?-6:1-dy;d.setDate(d.getDate()+df);while(d<=e){cd.push({l:`${d.getMonth()+1}/${d.getDate()}`,v:wm[td(new Date(d))]||0});d.setDate(d.getDate()+7);}}
  const expRows=Object.entries(expByCat).filter(([,v])=>v>0).map(([l,v])=>({l,v,c:'var(--red)'}));
  q('sc').innerHTML=`<div style="font-size:10px;color:var(--tpl);letter-spacing:.05em;text-align:center;margin-bottom:.8rem">${fmtD(s)}${td(s)===td(e)?'':' → '+fmtD(e)}</div>
    <div class="krow"><div class="kpi"><div class="kpi-v" style="color:var(--grn)">$${ti.toFixed(0)}</div><div class="kpi-l">总收入</div></div><div class="kpi"><div class="kpi-v" style="color:var(--red)">$${te.toFixed(0)}</div><div class="kpi-l">总支出</div></div><div class="kpi"><div class="kpi-v">$${(ti-te).toFixed(0)}</div><div class="kpi-l">结余</div></div></div>
    <div class="krow"><div class="kpi"><div class="kpi-v">$${cash.toFixed(0)}</div><div class="kpi-l">Cash</div></div><div class="kpi"><div class="kpi-v">$${emt.toFixed(0)}</div><div class="kpi-l">EMT</div></div><div class="kpi"><div class="kpi-v">¥${rmb.toFixed(0)}</div><div class="kpi-l">RMB</div></div></div>
    <div class="scard"><div class="stitle">服务类型</div>${incR.length?barRows([{l:'Full Set',v:fs,c:'#2C2520'},{l:'Refill',v:rf,c:'#A89880'}]):'<p style="color:#ccc;font-size:11px">暂无</p>'}</div>
    <div class="scard"><div class="stitle">客人类型</div>${incR.length?barRows([{l:'新客',v:nw,c:'#7A9B76'},{l:'回头客',v:rt,c:'#A89880'}]):'<p style="color:#ccc;font-size:11px">暂无</p>'}</div>
    ${expRows.length?`<div class="scard"><div class="stitle">支出分类</div>${barRows(expRows)}</div>`:''}
    <div class="scard"><div class="stitle">${statPer==='week'?'本周每日':'每周'}客人数</div>${svgBar(cd)}</div>`;
}

// ---- SPREADSHEET ----
function gv(rec,k){
  if(k==='type')return rec.type==='expense'?'支出':'收入';
  if(k==='proj')return rec.type==='expense'?(rec.category||''):(rec.service||'');
  if(k==='sub') return rec.type==='expense'?(rec.note||''):(rec.customer||'');
  if(k==='pay') return rec.payment||'';
  if(k==='amount')return amtN(rec.amount)?String(amtN(rec.amount)):'';
  return rec[k]||'';
}
async function sv(rec,k,v){
  if(k==='type'){rec.type=v==='支出'?'expense':'income';}
  else if(k==='proj'){if(rec.type==='expense')rec.category=v;else rec.service=v;}
  else if(k==='sub'){if(rec.type==='expense')rec.note=v;else rec.customer=v;}
  else if(k==='pay'){rec.payment=v;}
  else if(k==='amount'){rec.amount=v?'$'+v:'';}
  else{rec[k]=v;}
  if(rec._id&&rec._d){const d=parseD(rec._d);await updRec(d,rec._id,rec);}
}

function updateFormula(ri,ci){
  if(ri==null){q('cellRef').textContent='—';q('cellVal').textContent='';return;}
  const col=COLS[ci];const rec=ssRecs[ri];
  q('cellRef').textContent=COL_LETTERS[ci]+(ri+1);
  q('cellVal').textContent=rec&&col?gv(rec,col.k):'';
}

function renderSS(){
  q('ledMth').textContent=mthLabel(ledDate);
  const sorted=[...ssRecs].sort((a,b)=>a._d.localeCompare(b._d));
  ssRecs=sorted;
  const{inc,exp,bal}=calcTotals(ssRecs);
  let thead=`<thead><tr><th class="ss-corner"></th>${COLS.map((c,ci)=>`<th class="ss-ch" style="min-width:${c.w}px">${c.h}</th>`).join('')}<th class="ss-ch" style="min-width:30px"></th></tr></thead>`;
  let tbody='<tbody>';
  ssRecs.forEach((rec,ri)=>{
    const isExp=rec.type==='expense';
    const bgcls=isExp?'exp-bg':'inc-bg';
    tbody+=`<tr data-ri="${ri}"><td class="ss-rn">${ri+1}</td>`;
    COLS.forEach((col,ci)=>{
      const v=gv(rec,col.k);
      let inner='';
      if(col.t==='sel'){
        inner=`<select class="ss-sel" data-ri="${ri}" data-ci="${ci}">${col.o.map(o=>`<option${o===v?' selected':''}>${o}</option>`).join('')}</select>`;
      }else if(col.t==='date'){
        inner=`<input class="ss-inp" type="date" data-ri="${ri}" data-ci="${ci}" value="${v}"/>`;
      }else if(col.t==='num'){
        const color=isExp?'var(--red)':'var(--grn)';
        inner=`<input class="ss-inp" type="number" data-ri="${ri}" data-ci="${ci}" value="${v}" style="color:${color};font-weight:500;text-align:right"/>`;
      }else{
        inner=`<input class="ss-inp" type="text" data-ri="${ri}" data-ci="${ci}" value="${v}"/>`;
      }
      tbody+=`<td class="ss-cell ${bgcls}" data-ri="${ri}" data-ci="${ci}">${inner}</td>`;
    });
    tbody+=`<td class="ss-cell ${bgcls}" style="padding:0 2px"><button class="ss-cell-del" data-ri="${ri}">×</button></td></tr>`;
  });
  // Empty new row
  tbody+=`<tr class="ss-newr-row" id="newRow"><td class="ss-rn" style="color:#ccc">${ssRecs.length+1}</td>`;
  COLS.forEach((col,ci)=>{
    const ph={date:'日期',type:'类型',proj:'项目',sub:'备注',amount:'金额',pay:'付款'}[col.k]||'';
    let inner='';
    if(col.t==='sel')inner=`<select class="ss-sel" data-new="1" data-ci="${ci}"><option value="">— ${ph}</option>${col.o.map(o=>`<option>${o}</option>`).join('')}</select>`;
    else if(col.t==='date')inner=`<input class="ss-inp" type="date" data-new="1" data-ci="${ci}" value="${td()}" style="color:#bbb"/>`;
    else if(col.t==='num')inner=`<input class="ss-inp" type="number" data-new="1" data-ci="${ci}" placeholder="0" style="color:#bbb;text-align:right"/>`;
    else inner=`<input class="ss-inp" type="text" data-new="1" data-ci="${ci}" placeholder="${ph}" style="color:#bbb"/>`;
    inner+=``;
    tbody+=`<td class="ss-cell" style="border-color:#eee" data-new="1" data-ci="${ci}">${inner}</td>`;
  });
  tbody+=`<td class="ss-cell" style="border-color:#eee"></td></tr>`;
  // Totals
  tbody+=`<tr class="ss-tot-row"><td class="ss-rn">Σ</td><td class="ss-cell" colspan="2" style="padding:4px 8px;color:#5f6368;font-size:11px">${mthLabel(ledDate)} 合计</td><td class="ss-cell" colspan="2" style="padding:4px 8px;color:var(--grn);font-weight:600">收入: $${inc.toFixed(2)}</td><td class="ss-cell" style="padding:4px 8px;color:var(--red);font-weight:600">支出: $${exp.toFixed(2)}</td><td class="ss-cell" colspan="2" style="padding:4px 8px;color:var(--dk);font-weight:700">结余: $${bal.toFixed(2)}</td></tr>`;
  tbody+='</tbody>';
  q('ssTable').innerHTML=thead+tbody;
  bindSS();
}

function bindSS(){
  // Existing cell inputs
  q('ssTable').querySelectorAll('.ss-inp,.ss-sel').forEach(el=>{
    const ri=parseInt(el.dataset.ri);const ci=parseInt(el.dataset.ci);const isNew=el.dataset.new==='1';
    el.addEventListener('focus',()=>{
      document.querySelectorAll('.ss-cell').forEach(c=>c.classList.remove('sel'));
      el.closest('.ss-cell')?.classList.add('sel');
      if(!isNew)updateFormula(ri,ci);
    });
    el.addEventListener('change',async()=>{
      if(isNew)return;
      const col=COLS[ci];const rec=ssRecs[ri];
      await sv(rec,col.k,el.value);
      if(col.k==='type'){renderSS();return;}// re-render on type change
      updateSSTotals();
    });
    if(el.tagName==='INPUT'){
      el.addEventListener('keydown',e=>{
        if(e.key==='Enter'||e.key==='Tab'){
          e.preventDefault();
          const cells=[...q('ssTable').querySelectorAll('.ss-inp,.ss-sel')];
          const idx=cells.indexOf(el);
          if(idx<cells.length-1)cells[idx+1].focus();
        }
      });
    }
  });
  // New row handling
  let newData={date:td(),type:'',proj:'',sub:'',amount:'',pay:''};
  q('ssTable').querySelectorAll('[data-new="1"]').forEach(el=>{
    const ci=parseInt(el.dataset.ci);
    const col=COLS[ci];
    el.addEventListener('change',()=>{newData[col.k]=el.value;});
    el.addEventListener('keydown',async e=>{
      if(e.key==='Enter'){
        const d=parseD(newData.date||td());
        const isExp=(newData.type==='支出');
        const rec={_id:uid(),_d:td(d),type:isExp?'expense':'income',date:td(d),service:isExp?'':newData.proj,category:isExp?newData.proj:'',customer:isExp?'':newData.sub,note:isExp?newData.sub:'',amount:newData.amount?'$'+newData.amount:'',payment:newData.pay,time:nowT()};
        if(!rec.amount)return;
        await addRec(d,rec);
        await renderLedger();
      }
    });
  });
  // Delete buttons
  q('ssTable').querySelectorAll('.ss-cell-del').forEach(btn=>btn.addEventListener('click',async function(){
    const ri=parseInt(this.dataset.ri);const rec=ssRecs[ri];
    if(!rec)return;
    confirm(`删除第${ri+1}行记录？`,async()=>{await delRec(parseD(rec._d),rec._id);await renderLedger();});
  }));
}

function updateSSTotals(){
  const{inc,exp,bal}=calcTotals(ssRecs);
  const totRow=q('ssTable').querySelector('.ss-tot-row');
  if(!totRow)return;
  const cells=totRow.querySelectorAll('.ss-cell');
  if(cells[1])cells[1].style.color='var(--grn)',cells[1].textContent='收入: $'+inc.toFixed(2);
  if(cells[2])cells[2].style.color='var(--red)',cells[2].textContent='支出: $'+exp.toFixed(2);
  if(cells[3])cells[3].textContent='结余: $'+bal.toFixed(2);
}

async function renderLedger(){
  ssRecs=await monthRecs(ledDate);
  renderSS();
}

// Excel export
q('dlBtn').addEventListener('click',async()=>{
  const recs=ssRecs,[{inc,exp,bal}]=[calcTotals(recs)];
  const sorted=[...recs].sort((a,b)=>a._d.localeCompare(b._d));
  const data=[['日期','类型','项目','客人/备注','金额(数字)','付款','时间'],
    ...sorted.map(r=>{const ie=r.type==='expense';return[r._d,ie?'支出':'收入',ie?(r.category||''):r.service,ie?(r.note||''):(r.customer||''),ie?-amtN(r.amount):amtN(r.amount),r.payment||'',r.time||''];}),
    [],[`${mthLabel(ledDate)} 汇总`],['总收入','$'+inc.toFixed(2)],['总支出','$'+exp.toFixed(2)],['结余','$'+bal.toFixed(2)]];
  const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:12},{wch:6},{wch:14},{wch:14},{wch:10},{wch:8},{wch:7}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,mthLabel(ledDate));
  const arr=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  const blob=new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`BunnyBeauty_${ledDate.getFullYear()}-${pad(ledDate.getMonth()+1)}.xlsx`;a.click();
});

q('addRowBtn').addEventListener('click',()=>{
  const nrEl=q('newRow');if(nrEl){const inp=nrEl.querySelector('.ss-inp');if(inp)inp.focus();}
});

}

document.querySelectorAll('.ntab').forEach(t=>t.addEventListener('click',function(){nav(this.dataset.pg);}));
document.querySelectorAll('.ptab').forEach(t=>t.addEventListener('click',function(){statPer=this.dataset.p;document.querySelectorAll('.ptab').forEach(p=>p.classList.toggle('on',p===this));q('crange').style.display=statPer==='custom'?'flex':'none';if(statPer!=='custom')renderStats();}));
q('cQuery').addEventListener('click',()=>{const s=q('cStart').value,e=q('cEnd').value;if(s&&e){cStart=parseD(s);cEnd=parseD(e);renderStats();}});

(async()=>{try{const r=await window.storage.get('bunny_gs_url');if(r&&r.value)gsUrl=r.value;}catch{}nav('homePg');})();
